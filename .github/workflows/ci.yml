name: CI
on:
  push:
    branches: [master]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Test with coverage
        run: |
          npm run test:coverage | tee /tmp/vitest-coverage.out
          {
            echo "### Coverage (Node ${{ matrix.node-version }})"
            echo '```'
            sed -n '/% Coverage report/,$p' /tmp/vitest-coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - run: npx publint
      - run: npx @arethetypeswrong/cli --pack .
